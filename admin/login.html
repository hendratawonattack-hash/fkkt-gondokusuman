<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | FKKT Gondokusuman</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    body { background-color: var(--color-bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--color-surface); padding: var(--space-8); border-radius: var(--radius-lg); box-shadow: var(--shadow-xl); width: 100%; max-width: 400px; text-align: center; }
    .login-logo { font-family: var(--font-secondary); font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary-dark); margin-bottom: var(--space-2); }
    .form-group { text-align: left; margin-bottom: var(--space-4); }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">FKKT Admin</div>
    <p class="text-secondary" style="margin-bottom: var(--space-6);">Login ke panel administrator</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" required placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required placeholder="admin123">
      </div>
      
      <div id="loginError" style="color: red; font-size: 14px; margin-bottom: 15px; display: none;">Username atau password salah!</div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;">Masuk</button>
    </form>
    
    <div style="margin-top: var(--space-6);">
      <a href="../index.html" class="text-secondary" style="font-size: var(--text-sm);"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
    </div>
  </div>

  <script src="../assets/js/admin.js"></script>
</body>
</html>
