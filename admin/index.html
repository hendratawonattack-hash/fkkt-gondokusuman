<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Admin FKKT Gondokusuman</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: var(--color-primary-dark); color: white; padding: var(--space-6) 0; flex-shrink: 0; }
    .sidebar-brand { font-family: var(--font-secondary); font-size: var(--text-xl); font-weight: 700; padding: 0 var(--space-6); margin-bottom: var(--space-8); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 5px; }
    .sidebar-link { color: rgba(255,255,255,0.7); padding: var(--space-3) var(--space-6); display: flex; align-items: center; gap: var(--space-3); transition: 0.2s; }
    .sidebar-link:hover, .sidebar-link.active { color: white; background: rgba(255,255,255,0.1); border-left: 4px solid var(--color-accent); }
    
    .main-content { flex-grow: 1; background: var(--color-bg); display: flex; flex-direction: column; }
    .topbar { background: white; padding: var(--space-4) var(--space-8); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); }
    .content-area { padding: var(--space-8); flex-grow: 1; overflow-y: auto; }
    
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-6); margin-bottom: var(--space-8); }
    .stat-card { background: white; padding: var(--space-6); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: var(--space-4); }
    .stat-icon { width: 50px; height: 50px; border-radius: 50%; background: var(--color-bg-alt); color: var(--color-primary); display: flex; align-items: center; justify-content: center; font-size: 24px; }
  </style>
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">FKKT Admin</div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link active"><i class="fas fa-home"></i> Dashboard</a>
        <a href="berita.html" class="sidebar-link"><i class="fas fa-newspaper"></i> Berita</a>
        <a href="agenda.html" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Agenda</a>
        <a href="program.html" class="sidebar-link"><i class="fas fa-tasks"></i> Program Kerja</a>
        <a href="galeri.html" class="sidebar-link"><i class="fas fa-images"></i> Galeri</a>
        <a href="prestasi.html" class="sidebar-link"><i class="fas fa-trophy"></i> Prestasi</a>
        <a href="struktur.html" class="sidebar-link"><i class="fas fa-sitemap"></i> Struktur Org</a>
        <a href="kontak.html" class="sidebar-link"><i class="fas fa-envelope"></i> Pesan Masuk</a>
        <a href="profil.html" class="sidebar-link"><i class="fas fa-building"></i> Profil Web</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2 style="font-size: var(--text-xl); font-family: var(--font-primary);">Dashboard</h2>
        <div>
          <span style="margin-right: 15px;">Halo, Admin!</span>
          <button id="logoutBtn" class="btn btn-outline" style="padding: 5px 15px;">Logout</button>
        </div>
      </header>
      
      <div class="content-area">
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-newspaper"></i></div>
            <div><div style="font-size: 24px; font-weight: bold;">12</div><div class="text-secondary">Berita</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
            <div><div style="font-size: 24px; font-weight: bold;">4</div><div class="text-secondary">Agenda Aktif</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-tasks"></i></div>
            <div><div style="font-size: 24px; font-weight: bold;">6</div><div class="text-secondary">Program</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-envelope"></i></div>
            <div><div style="font-size: 24px; font-weight: bold;">3</div><div class="text-secondary">Pesan Baru</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h3>Aktivitas Terbaru</h3>
            <p class="text-secondary">Belum ada aktivitas terbaru.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/admin.js"></script>
</body>
</html>
